<body>
    <div class="container">
        <div class="heart">❤️</div>
        <h1>Спасибо, ваш ответ получен!</h1>
        <p>Мы очень рады, что вы будете с нами в этот день (или что вы помните о нас, даже если не сможете прийти).</p>

    </div>

</html>
